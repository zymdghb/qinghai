<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青海地图管理后台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #2D5A4A;
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        .regions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .region-card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: transform 0.2s ease;
        }

        .region-card:hover {
            transform: translateY(-3px);
        }

        .region-card h3 {
            color: #2D5A4A;
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }

        .region-card p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .edit-btn {
            width: 100%;
            padding: 0.8rem;
            background: #2D5A4A;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Noto Sans SC', sans-serif;
            transition: background 0.2s;
        }

        .edit-btn:hover {
            background: #4A7C6B;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }

        .modal-header h2 {
            color: #2D5A4A;
        }

        .close-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2D5A4A;
        }

        .photo-list {
            margin-top: 1rem;
        }

        .photo-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 0.8rem;
        }

        .photo-item img {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
        }

        .photo-item input {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .photo-item button {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .remove-photo {
            background: #ff4757;
            color: white;
        }

        .add-photo {
            background: #2D5A4A;
            color: white;
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }

        .save-btn {
            width: 100%;
            padding: 1rem;
            background: #C9A962;
            color: #1a1a1a;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        .save-btn:hover {
            background: #d4b872;
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            background: #2D5A4A;
            color: white;
            border-radius: 10px;
            display: none;
            z-index: 200;
        }

        .message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #2D5A4A;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← 返回首页</a>
        <h1>🗺️ 内容管理后台</h1>
        <p style="text-align: center; color: #666; margin-bottom: 2rem;">
            修改内容后会自动保存到浏览器本地存储
        </p>
        
        <div class="regions-grid" id="regionsGrid"></div>
    </div>

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">编辑</h2>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            
            <form id="editForm">
                <input type="hidden" id="regionId">
                
                <div class="form-group">
                    <label>名称</label>
                    <input type="text" id="name" required>
                </div>
                
                <div class="form-group">
                    <label>副标题</label>
                    <input type="text" id="subtitle">
                </div>
                
                <div class="form-group">
                    <label>封面图片URL</label>
                    <input type="url" id="cover" placeholder="https://..." required>
                    <p style="margin-top: 0.5rem; font-size: 0.85rem; color: #666;">
                        💡 可以上传图片到 GitHub，然后用图片链接
                    </p>
                </div>
                
                <div class="form-group">
                    <label>简介</label>
                    <textarea id="intro" rows="4"></textarea>
                </div>
                
                <div class="form-group">
                    <label>相册照片</label>
                    <div class="photo-list" id="photoList"></div>
                    <button type="button" class="add-photo" onclick="addPhoto()">+ 添加照片</button>
                </div>
                
                <button type="submit" class="save-btn">保存修改</button>
            </form>
        </div>
    </div>

    <div class="message" id="message">保存成功！</div>

    <script>
        const regions = [
            { id: 'xining', name: '西宁市' },
            { id: 'haidong', name: '海东市' },
            { id: 'haibei', name: '海北藏族自治州' },
            { id: 'huangnan', name: '黄南藏族自治州' },
            { id: 'hainan', name: '海南藏族自治州' },
            { id: 'guluo', name: '果洛藏族自治州' },
            { id: 'yushu', name: '玉树藏族自治州' },
            { id: 'haixi', name: '海西蒙古族藏族自治州' }
        ];

        let regionData = {};

        function loadData() {
            const saved = localStorage.getItem('qinghai_data');
            if (saved) {
                regionData = JSON.parse(saved);
            }
            // 初始化空数据
            regions.forEach(r => {
                if (!regionData[r.id]) {
                    regionData[r.id] = {
                        name: r.name,
                        subtitle: '',
                        cover: '',
                        intro: '',
                        photos: []
                    };
                }
            });
        }

        function renderRegions() {
            const grid = document.getElementById('regionsGrid');
            grid.innerHTML = regions.map(r => `
                <div class="region-card">
                    <h3>${regionData[r.id]?.name || r.name}</h3>
                    <p>${regionData[r.id]?.subtitle || '点击编辑'}</p>
                    <button class="edit-btn" onclick="openEdit('${r.id}')">编辑内容</button>
                </div>
            `).join('');
        }

        function openEdit(regionId) {
            const data = regionData[regionId];
            document.getElementById('regionId').value = regionId;
            document.getElementById('modalTitle').textContent = '编辑 - ' + data.name;
            document.getElementById('name').value = data.name;
            document.getElementById('subtitle').value = data.subtitle || '';
            document.getElementById('cover').value = data.cover || '';
            document.getElementById('intro').value = data.intro || '';
            
            renderPhotos(data.photos || []);
            
            document.getElementById('editModal').classList.add('active');
        }

        function renderPhotos(photos) {
            const list = document.getElementById('photoList');
            list.innerHTML = photos.map((p, i) => `
                <div class="photo-item">
                    <img src="${p.url || 'https://via.placeholder.com/80x60'}" alt="">
                    <input type="text" value="${p.url}" placeholder="图片URL" onchange="updatePhoto(${i}, 'url', this.value)">
                    <input type="text" value="${p.caption}" placeholder="描述" onchange="updatePhoto(${i}, 'caption', this.value)">
                    <button class="remove-photo" onclick="removePhoto(${i})">删除</button>
                </div>
            `).join('');
            window.currentPhotos = photos;
        }

        function addPhoto() {
            if (!window.currentPhotos) window.currentPhotos = [];
            window.currentPhotos.push({ url: '', caption: '' });
            renderPhotos(window.currentPhotos);
        }

        function updatePhoto(index, field, value) {
            window.currentPhotos[index][field] = value;
        }

        function removePhoto(index) {
            window.currentPhotos.splice(index, 1);
            renderPhotos(window.currentPhotos);
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        document.getElementById('editForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const regionId = document.getElementById('regionId').value;
            regionData[regionId] = {
                name: document.getElementById('name').value,
                subtitle: document.getElementById('subtitle').value,
                cover: document.getElementById('cover').value,
                intro: document.getElementById('intro').value,
                photos: window.currentPhotos || []
            };
            
            localStorage.setItem('qinghai_data', JSON.stringify(regionData));
            
            closeModal();
            renderRegions();
            showMessage();
        });

        function showMessage() {
            const msg = document.getElementById('message');
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 2000);
        }

        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target.id === 'editModal') closeModal();
        });

        loadData();
        renderRegions();
    </script>
</body>
</html>
